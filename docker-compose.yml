version: '3.8'

# ══════════════════════════════════════════════════════════════════════════════
# SampleMind AI v3.0 — Docker Compose Stack (Development)
# ══════════════════════════════════════════════════════════════════════════════
#
# This is the DEVELOPMENT compose file. It starts the full local stack:
#   • samplemind-api  — FastAPI backend       (http://localhost:8000)
#   • chromadb        — Vector database       (http://localhost:8002)
#   • ollama          — Local LLM inference   (http://localhost:11434)
#   • mongodb         — Document database     (mongodb://localhost:27017)
#   • redis           — Cache + Celery broker (redis://localhost:6379)
#   • prometheus      — Metrics collection    (http://localhost:9090)
#   • grafana         — Metrics dashboards    (http://localhost:3000)
#
# Quick start:
#   docker-compose up -d
#
# Start only databases (for local dev server):
#   docker-compose up -d mongodb redis chromadb
#
# View logs:
#   docker-compose logs -f samplemind-api
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── samplemind-api ─────────────────────────────────────────────────────────
  # Main FastAPI application. Builds from local Dockerfile and mounts source
  # code so changes are picked up by uvicorn --reload inside the container.
  samplemind-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samplemind-api
    ports:
      - "8000:8000"
    environment:
      - SAMPLEMIND_ENV=development
      - MONGODB_URL=mongodb://mongodb:27017/samplemind
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    volumes:
      - ./src:/app/src:cached
      - ./data:/data
    depends_on:
      - mongodb
      - redis
      - ollama
      - chromadb
    networks:
      - samplemind-network
    restart: unless-stopped

  # ── chromadb ─────────────────────────────────────────────────────────────────
  # ChromaDB vector database for storing and querying audio embeddings.
  # Exposed on host port 8002 (maps to container port 8000).
  chromadb:
    image: chromadb/chroma:latest
    container_name: samplemind-chroma
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - samplemind-network
    restart: unless-stopped

  # ── ollama ───────────────────────────────────────────────────────────────────
  # Ollama local LLM server for offline inference (qwen2.5-coder:7b, phi3, etc.).
  # Model files are persisted in the ollama_models volume.
  ollama:
    image: ollama/ollama:latest
    container_name: samplemind-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - samplemind-network
    restart: unless-stopped

  # ── mongodb ──────────────────────────────────────────────────────────────────
  # MongoDB 7.0 — primary document store for sample metadata, user data, and
  # library records. Data persisted in mongodb_data volume.
  mongodb:
    image: mongo:7.0
    container_name: samplemind-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=samplemind
    volumes:
      - mongodb_data:/data/db
    networks:
      - samplemind-network
    restart: unless-stopped

  # ── redis ────────────────────────────────────────────────────────────────────
  # Redis 7.2 — used for session caching, Celery task broker, and pub/sub for
  # agent progress streaming. AOF persistence enabled, 1 GB memory cap.
  redis:
    image: redis:7.2-alpine
    container_name: samplemind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 1gb
    volumes:
      - redis_data:/data
    networks:
      - samplemind-network
    restart: unless-stopped

  # ── Monitoring Stack ────────────────────────────────────────────────────────
  # Prometheus scrapes /metrics from the backend for request latency, error
  # rates, and audio processing throughput.
  prometheus:
    image: prom/prometheus:latest
    container_name: samplemind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - samplemind-network
    restart: unless-stopped
    # depends_on:
    #   - postgres

  # ── grafana ──────────────────────────────────────────────────────────────────
  # Grafana dashboards for visualising Prometheus metrics. Default login is
  # admin / <GRAFANA_ADMIN_PASSWORD from .env>.  Sign-up is disabled.
  grafana:
    image: grafana/grafana:latest
    container_name: samplemind-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - samplemind-network
    restart: unless-stopped
    depends_on:
      - prometheus


# ── Networks ──────────────────────────────────────────────────────────────────
# All services share one bridge network so they can resolve each other by
# container name (e.g. the API reaches MongoDB at "mongodb:27017").
networks:
  samplemind-network:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
# Named volumes persist data across container restarts.
volumes:
  mongodb_data:      # MongoDB data directory
  redis_data:        # Redis AOF + RDB persistence
  ollama_models:     # Downloaded LLM model weights
  prometheus_data:   # Prometheus TSDB metrics storage
  grafana_data:      # Grafana dashboards and config DB
  chroma_data:       # ChromaDB vector embedding storage
