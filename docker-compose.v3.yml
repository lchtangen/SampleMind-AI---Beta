# SampleMind AI v3.0 — Full-stack Docker Compose (P0-019)
#
# Services: backend (FastAPI), frontend (Next.js), mongodb, redis, celery-worker
# Monitoring: prometheus, grafana
#
# Quick start:
#   cp .env.example .env         # fill in SECRET_KEY, API keys, etc.
#   docker compose -f docker-compose.v3.yml up -d
#   docker compose -f docker-compose.v3.yml logs -f backend
#
# Access:
#   FastAPI:   http://localhost:8000      (API + docs at /api/docs)
#   Next.js:   http://localhost:3000
#   Grafana:   http://localhost:3001

name: samplemind-v3

services:

  # ── Backend (FastAPI + uvicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: samplemind-backend
    ports:
      - "8000:8000"
    environment:
      SAMPLEMIND_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      MONGODB_URL: mongodb://mongodb:27017/samplemind
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - sample_library:/data/samples
      - faiss_index:/root/.samplemind/faiss
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplemind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/web
      dockerfile: ../../Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    container_name: samplemind-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - samplemind-net
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: samplemind-celery
    command: >
      celery -A samplemind.core.tasks.celery_app worker
             --loglevel=info
             --queues=default,ai_analysis,audio_processing
             --concurrency=2
    environment:
      SAMPLEMIND_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      MONGODB_URL: mongodb://mongodb:27017/samplemind
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - sample_library:/data/samples
      - faiss_index:/root/.samplemind/faiss
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - samplemind-net
    restart: unless-stopped

  # ── MongoDB 7.0 ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: samplemind-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: samplemind
    volumes:
      - mongo_data:/data/db
    networks:
      - samplemind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: samplemind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - samplemind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (offline LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: samplemind-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - samplemind-net
    restart: unless-stopped
    profiles:
      - ollama     # opt-in: docker compose --profile ollama up

  # ── ChromaDB ─────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: samplemind-chroma
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - samplemind-net
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: samplemind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - samplemind-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: samplemind-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-samplemind}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - samplemind-net
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles:
      - monitoring


# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  samplemind-net:
    driver: bridge
    name: samplemind-net


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    name: samplemind_mongo_data
  redis_data:
    name: samplemind_redis_data
  chroma_data:
    name: samplemind_chroma_data
  ollama_models:
    name: samplemind_ollama_models
  prometheus_data:
    name: samplemind_prometheus_data
  grafana_data:
    name: samplemind_grafana_data
  sample_library:
    name: samplemind_sample_library
  faiss_index:
    name: samplemind_faiss_index
