name: "Copilot Setup Steps"

on: workflow_dispatch

jobs:
  copilot-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync
          uv pip install ruff mypy pytest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: cd apps/web && npm ci --legacy-peer-deps

      - name: Verify Python environment
        run: |
          uv run python -c "import samplemind; print('SampleMind loaded')"
          uv run ruff --version
          uv run mypy --version

      - name: Verify frontend build
        run: cd apps/web && npx next --version

      - name: Configure Copilot CLI environment
        run: |
          echo "COPILOT_CUSTOM_INSTRUCTIONS_DIRS=$(pwd)/.github/instructions" >> $GITHUB_ENV
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV
          echo "PATH=$(pwd)/.venv/bin:$PATH" >> $GITHUB_ENV
